<!-- Dynamic Merchandise Options (Appears when bundle is checked) -->
<div id="merch-options-wrapper" style="display: none; margin-top: 12px; width: 100%; padding-left: 30px; box-sizing: border-box; display: flex; flex-direction: column; gap: 15px;">
    
    <!-- T-Shirt Base Color Selector -->
    <div>
        <label for="shirt_color" style="font-size: 0.85rem; color: var(--accent-cyan);">Select T-Shirt Base Color Profile:</label>
        <select id="shirt_color" name="shirt_color" style="padding: 10px; font-size: 0.9rem; background: rgba(5,2,18,0.95); width: 100%;">
            <option value="purple">Cosmic Purple</option>
            <option value="black">Matte Black</option>
            <option value="white">Premium White</option>
            <option value="grey">Athletic Grey</option>
            <option value="pink">Soft Pink</option>
            <option value="green">Matrix Green</option>
            <option value="red">Crimson Red</option>
            <option value="blue">Royal Blue</option>
        </select>
    </div>

    <!-- T-Shirt Size Selector -->
    <div>
        <label for="shirt_size" style="font-size: 0.85rem; color: var(--accent-cyan);">Select T-Shirt Size:</label>
        <select id="shirt_size" name="shirt_size" style="padding: 10px; font-size: 0.9rem; background: rgba(5,2,18,0.95); width: 100%;">
            <option value="S">Small</option>
            <option value="M">Medium</option>
            <option value="L">Large</option>
            <option value="XL">X-Large</option>
            <option value="2XL">2X-Large</option>
        </select>
    </div>

    <!-- Tumbler Color Selector -->
    <div>
        <label for="tumbler_color" style="font-size: 0.85rem; color: var(--accent-cyan);">Select Insulated Tumbler Color Preference:</label>
        <select id="tumbler_color" name="tumbler_color" style="padding: 10px; font-size: 0.9rem; background: rgba(5,2,18,0.95); width: 100%;">
            <option value="matte_black">Matte Black Steel</option>
            <option value="cosmic_purple">Cosmic Deep Violet</option>
            <option value="matrix_green">Matrix Circuit Green</option>
            <option value="pure_white">Classic Premium White</option>
        </select>
    </div>

</div>
