<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AE9-Labs | Brand & Digital Systems</title>
    <style>
        :root {
            /* Deep, dark cosmic palette */
            --bg-space: #050212;
            --card-bg: rgba(13, 8, 38, 0.4);
            
            /* High-tech accent colors */
            --accent-green: #10b981;
            --accent-purple: #a855f7;
            --accent-cyan: #06b6d4;
            
            /* Clean data text colors */
            --text-light: #f8fafc;
            --text-muted: #cbd5e1;
            --border: rgba(168, 85, 247, 0.2);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-space);
            color: var(--text-light);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated Dynamic Cosmic Swirls (Canvas) */
        .galaxy-canvas {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 0;
            pointer-events: none;
        }

        /* Interactive Nebula Blend Overlay (CSS) */
        .nebula-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 1;
            pointer-events: none;
            mix-blend-mode: screen;
            background: 
                radial-gradient(circle at 20% 30%, rgba(168, 85, 247, 0.25) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(16, 185, 129, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(6, 182, 212, 0.15) 0%, transparent 60%);
            animation: nebulaSwirl 25s ease-in-out infinite alternate;
        }

        @keyframes nebulaSwirl {
            0% { transform: scale(1) rotate(0deg); filter: hue-rotate(0deg); }
            100% { transform: scale(1.2) rotate(15deg); filter: hue-rotate(30deg); }
        }

        /* Randomized Shooting Star System */
        .shooting-star {
            position: absolute;
            left: 100%;
            width: 120px;
            height: 2px;
            background: linear-gradient(-45deg, var(--accent-green), rgba(0,0,0,0));
            filter: drop-shadow(0 0 8px var(--accent-green));
            pointer-events: none;
            z-index: 2;
            opacity: 0;
        }

        @keyframes shoot {
            0% { transform: translateX(0) translateY(0) rotate(-22deg); opacity: 1; }
            10% { opacity: 1; }
            100% { transform: translateX(-120vw) translateY(45vh) rotate(-22deg); opacity: 0; }
        }

        .container {
            max-width: 1000px;
            width: 100%;
            position: relative;
            z-index: 10;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        /* The Updated Logo Integration Section */
        header img.brand-logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 2px solid var(--accent-green);
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.4);
            margin-bottom: 20px;
            position: relative;
            z-index: 10;
        }

        header h1 { 
            font-size: 3.5rem; 
            font-weight: 900;
            letter-spacing: 4px; 
            margin-bottom: 10px; 
            color: var(--text-light); 
            text-shadow: 0 0 25px rgba(168, 85, 247, 0.4);
        }
        
        header h1 span { 
            background: linear-gradient(90deg, var(--accent-green), var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        header p { color: var(--text-muted); font-size: 1.1rem; letter-spacing: 0.5px; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-green);
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.2);
        }

        .card h3 { margin-top: 0; font-size: 1.4rem; color: var(--text-light); letter-spacing: 0.5px; }
        
        /* Vibrant custom package pricing styles */
        .card:nth-child(1) .price { color: var(--accent-purple); text-shadow: 0 0 10px rgba(168, 85, 247, 0.3); }
        .card:nth-child(2) .price { color: var(--accent-cyan); text-shadow: 0 0 10px rgba(6, 182, 212, 0.3); }
        .card:nth-child(3) .price { color: var(--accent-green); text-shadow: 0 0 10px rgba(16, 185, 129, 0.3); }

        .price { font-size: 2.4rem; font-weight: bold; margin: 15px 0; }
        .features { list-style: none; padding: 0; margin: 0 0 20px 0; color: var(--text-muted); }
        .features li { margin-bottom: 12px; font-size: 0.95rem; }

        .addon-ui {
            border-top: 1px solid var(--border);
            padding-top: 15px;
            margin-top: 15px;
        }

        .addon-label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            color: var(--text-light);
        }

        input[type="checkbox"] {
            accent-color: var(--accent-green);
        }

            padding: 40px;
