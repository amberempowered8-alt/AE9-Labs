<!-- Unified Checkout UI Box -->
    <div class="checkout-box">
        <h2 style="margin-top: 0; font-size: 1.8rem; letter-spacing: 1px; color: var(--text-light); text-align: center; margin-bottom: 30px;">
            Secure Order Configuration
        </h2>

        <form id="checkoutForm" onsubmit="event.preventDefault(); alert('Order processing initiated.');">
            <!-- Email Address Input -->
            <div class="form-group">
                <label for="clientEmail">Account Email Address</label>
                <input type="email" id="clientEmail" required placeholder="name@company.com">
            </div>

            <!-- Base Layer System Selector -->
            <div class="form-group">
                <label for="baseLayerSelect">Structural Design Base Layer Library</label>
                <select id="baseLayerSelect" onchange="calculateTotal()">
                    <option value="none">-- Select Architecture Base Layer ($0) --</option>
                    <option value="corporate">1. Corporate & Tech Systems ($299)</option>
                    <option value="lifestyle">2. Lifestyle & Wellness ($249)</option>
                    <option value="creatives">3. Creatives & Modern Media ($199)</option>
                </select>
            </div>

            <!-- Add-on Extras Checkbox Container -->
            <div class="form-group">
                <label>System Expansion Packs & Physical Add-ons</label>
                <div class="checkbox-group">
                    <!-- Add-on 1: CMS Infrastructure Layer -->
                    <div>
                        <label class="checkbox-label">
                            <input type="checkbox" id="addonCms" value="150" onchange="calculateTotal()">
                            <div>
                                <strong>Dynamic CMS & Data Layer ($150)</strong>
                                <div style="font-size: 0.85rem; color: var(--text-muted); margin-top: 4px;">
                                    Integrates structured content nodes and automated data pipelines directly into your library layout.
                                </div>
                            </div>
                        </label>
                    </div>

                    <!-- Add-on 2: The Ultimate Merchandise Bundle Checkbox (Triggers inner-options-panel) -->
                    <div>
                        <label class="checkbox-label">
                            <input type="checkbox" id="addonMerch" value="195" onchange="toggleMerchOptions()">
                            <div>
                                <strong style="color: var(--accent-green);">🚀 Ultimate Brand Merchandise Bundle ($195)</strong>
                                <div style="font-size: 0.85rem; color: var(--text-muted); margin-top: 4px;">
                                    Maps your assets onto our high-end fulfillment lines: custom backpack, shirts, insulated travel tumbler, desk pad, and matte vinyl stickers.
                                </div>
                            </div>
                        </label>
                    </div>

                    <!-- Inner Conditional Options for Merchandise Customization -->
                    <div id="merchOptionsPanel" class="inner-options-panel">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                            <div>
                                <label for="shirtSize">T-Shirt Size Specification</label>
                                <select id="shirtSize">
                                    <option value="S">Small (S)</option>
                                    <option value="M" selected>Medium (M)</option>
                                    <option value="L">Large (L)</option>
                                    <option value="XL">Extra Large (XL)</option>
                                    <option value="XXL">Double Extra Large (XXL)</option>
                                </select>
                            </div>
                            <div>
                                <label for="stickerFinish">Sticker Finish Treatment</label>
                                <select id="stickerFinish">
                                    <option value="matte" selected>Premium Soft-Touch Matte</option>
                                    <option value="holographic">High-Contrast Cosmic Holographic</option>
                                    <option value="glossy">Ultra-Reflective High Gloss</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Dynamic Total Display Box -->
            <div class="total-display">
                Total System Value: <span id="computedTotal">$0</span>
            </div>

            <!-- Order Submission CTA -->
            <button type="submit">Initialize Deployment Pipeline</button>
        </form>
    </div>

    <script>
        // Toggle the visibility of the inner sizing/finish selectors dynamically
        function toggleMerchOptions() {
            const merchCheckbox = document.getElementById('addonMerch');
            const optionsPanel = document.getElementById('merchOptionsPanel');
            
            if (merchCheckbox.checked) {
                optionsPanel.style.display = 'flex';
            } else {
                optionsPanel.style.display = 'none';
            }
            
            calculateTotal();
        }

        // Calculate full architectural total based on selections
        function calculateTotal() {
            let runningTotal = 0;

            // 1. Evaluate Base Layer Selection
            const baseSelection = document.getElementById('baseLayerSelect').value;
            if (baseSelection === 'corporate') runningTotal += 299;
            else if (baseSelection === 'lifestyle') runningTotal += 249;
            else if (baseSelection === 'creatives') runningTotal += 199;

            // 2. Evaluate Core Infrastructure Add-on
            const cmsCheckbox = document.getElementById('addonCms');
            if (cmsCheckbox.checked) {
                runningTotal += parseFloat(cmsCheckbox.value);
            }

            // 3. Evaluate Physical Merchandise Bundle Add-on
            const merchCheckbox = document.getElementById('addonMerch');
            if (merchCheckbox.checked) {
                runningTotal += parseFloat(merchCheckbox.value);
            }

            // 4. Update Interface Total Node
            document.getElementById('computedTotal').innerText = '$' + runningTotal;
        }
    </script>
